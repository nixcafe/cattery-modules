$background_color = rgba(1c2733ff)
$input_background_color = rgba(13141e2b)
$input_border_color = rgba(43424a63)
$input_capslock_color = rgba(818df4c4)
$input_check_color = rgba(e19a2f66)
$input_fail_color = rgba(e3242466)
$input_color = rgba(ffffffff)
$label_font_family = Noto Sans

background {
    path = screenshot
    blur_passes = 3
    blur_size = 7
    color = $background_color
}

# Clock
label {
    monitor =
    text = $TIME
    text_align = center
    color = rgba(255, 255, 255, 1.0)
    font_size = 90
    font_family = $label_font_family
    shadow_passes = 3
    shadow_boost = 1.2
    position = 0, 60
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    text_align = center
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = $label_font_family
    shadow_passes = 1
    shadow_boost = 1
    position = 0, -10
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 1
    dots_size = 0.26
    dots_spacing = 0.4
    rounding = 12
    outer_color = $input_border_color
    inner_color = $input_background_color
    font_color = $input_color
    check_color = $input_check_color
    fail_color = $input_fail_color
    capslock_color = $input_capslock_color
    fade_on_empty = false
    position = 0, -75
    halign = center
    valign = center
}

# Media
label {
    monitor =
    text = cmd[update:3000] sh -c 't=$(playerctl metadata title 2>/dev/null); a=$(playerctl metadata artist 2>/dev/null); [ -n "$t" ] && echo "  $t - $a"'
    text_align = center
    color = rgba(255, 255, 255, 0.35)
    font_size = 13
    font_family = $label_font_family
    shadow_passes = 1
    shadow_boost = 1
    position = 0, 28
    halign = center
    valign = bottom
}
